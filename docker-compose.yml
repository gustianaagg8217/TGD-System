version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tgd-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tgd_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tgd_password}
      POSTGRES_DB: ${DB_NAME:-tgd_system}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tgd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tgd_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tgd-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tgd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MQTT Broker (Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2.0-alpine
    container_name: tgd-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - tgd-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "test"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tgd-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-tgd_user}:${DB_PASSWORD:-tgd_password}@postgres:5432/${DB_NAME:-tgd_system}
      SQLALCHEMY_DATABASE_URL: postgresql://${DB_USER:-tgd_user}:${DB_PASSWORD:-tgd_password}@postgres:5432/${DB_NAME:-tgd_system}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Application
      APP_NAME: TGd System
      APP_VERSION: 1.0.0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # API
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_V1_STR: /api/v1
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # CORS
      CORS_ORIGINS: '["http://localhost:3000", "http://frontend:3000", "http://localhost:8000"]'
      
      # Adapters
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      
      MODBUS_ENABLED: ${MODBUS_ENABLED:-true}
      MODBUS_HOST: modbus-simulator
      MODBUS_PORT: ${MODBUS_PORT:-502}
    
    ports:
      - "8000:8000"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
      - ./adapters_config.json:/app/adapters_config.json
    
    networks:
      - tgd-network
    
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tgd-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    
    ports:
      - "3000:3000"
    
    depends_on:
      - backend
    
    volumes:
      - ./frontend/src:/app/src
    
    networks:
      - tgd-network
    
    restart: unless-stopped

  # Modbus TCP Simulator (optional, for testing)
  modbus-simulator:
    image: python:3.11-slim
    container_name: tgd-modbus-simulator
    working_dir: /app
    command: python modbus_simulator.py
    volumes:
      - ./backend/modbus_simulator.py:/app/modbus_simulator.py
    ports:
      - "502:502"
    networks:
      - tgd-network
    restart: unless-stopped
    profiles:
      - testing

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mqtt_data:
    driver: local
  mqtt_logs:
    driver: local

networks:
  tgd-network:
    driver: bridge
