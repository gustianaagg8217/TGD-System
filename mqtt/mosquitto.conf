# Mosquitto MQTT Broker Configuration
# For TGd System Docker deployment

# Port settings
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Authentication
# allow_anonymous true
# password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_timestamp true
log_type all

# Performance
max_connections -1
max_queued_messages 1000

# Message settings
message_size_limit 0
max_inflight_messages 20

# Retention
retain_available true
